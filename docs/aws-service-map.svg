<path d="M 190 180 V 145 H 825 V 210" fill="none" stroke="#3D4852" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#ar)"/>
<text x="600" y="138" font-size="13" fill="#3D4852" text-anchor="middle">browser mic path — no telephony needed</text>

<!-- fastapi to frontend -->
<path d="M 660 240 H 690" fill="none" stroke="#3D4852" stroke-width="2.5" marker-end="url(#ar)" marker-start="url(#ar)"/>
<!-- fastapi down to loop -->
<path d="M 525 270 V 310" fill="none" stroke="#3D4852" stroke-width="2.5" marker-end="url(#ar)"/>
<!-- loop to validator -->
<path d="M 630 380 V 420" fill="none" stroke="#3D4852" stroke-width="3" marker-end="url(#ar)"/>
<text x="645" y="404" font-size="13" fill="#3D4852">proposed write</text>
<!-- validator to tools -->
<path d="M 480 500 V 560" fill="none" stroke="#2E7D4F" stroke-width="3" marker-end="url(#ar)"/>
<text x="492" y="535" font-size="13" font-weight="bold" fill="#2E7D4F">allow</text>
<!-- validator deny back to loop -->
<path d="M 390 465 H 372 V 345 H 390" fill="none" stroke="#C0392B" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#ar)"/>
<text x="366" y="410" font-size="13" fill="#C0392B" text-anchor="end" transform="rotate(-90 366 410)">deny + reason</text>
<!-- validator to audit -->
<path d="M 760 460 H 790" fill="none" stroke="#C98A16" stroke-width="2.5" marker-end="url(#arA)"/>
<!-- tools to simulator -->
<path d="M 660 605 H 690" fill="none" stroke="#3D4852" stroke-width="2.5" marker-end="url(#ar)" marker-start="url(#ar)"/>

<!-- loop out to boundary bar -->
<path d="M 960 345 H 1000" fill="none" stroke="#3A5BC7" stroke-width="3.5" marker-end="url(#ar)" marker-start="url(#ar)"/>
<text x="980" y="330" font-size="13" font-weight="bold" fill="#243D8F" text-anchor="middle">inference only</text>
