<path d="M 960 240 H 978 V 270 H 1000" fill="none" stroke="#3A5BC7" stroke-width="3" marker-end="url(#ar)" marker-start="url(#ar)"/>
<text x="905" y="290" font-size="13" fill="#243D8F" text-anchor="middle">audio streams</text>

<!-- bar fan-out -->
<path d="M 1044 300 H 1090" fill="none" stroke="#3A5BC7" stroke-width="2.5" marker-end="url(#ar)" marker-start="url(#ar)"/>
<path d="M 1044 400 H 1090" fill="none" stroke="#3A5BC7" stroke-width="2.5" marker-end="url(#ar)" marker-start="url(#ar)"/>
<path d="M 1044 490 H 1090" fill="none" stroke="#3A5BC7" stroke-width="2.5" marker-end="url(#ar)" marker-start="url(#ar)"/>
<path d="M 1044 572 H 1090" fill="none" stroke="#3A5BC7" stroke-width="2.5" marker-end="url(#ar)" marker-start="url(#ar)"/>
<path d="M 1044 648 H 1090" fill="none" stroke="#3A5BC7" stroke-width="2.5" marker-end="url(#ar)" marker-start="url(#ar)"/>

<!-- declined up to aws -->
<path d="M 1305 730 V 697" fill="none" stroke="#9A9AA0" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arG)"/>

<!-- governance up-links -->
<path d="M 675 880 V 705" fill="none" stroke="#9C4070" stroke-width="2" stroke-dasharray="5 5"/>
<path d="M 1305 880 V 850" fill="none" stroke="#9C4070" stroke-width="2" stroke-dasharray="5 5"/>

<!-- legend -->
<text x="50" y="1092" font-size="13" fill="#5A6672">Solid green block = you operate it (IaaS).  Blue = AWS operates it (MaaS).  Amber dashed = demo convenience, released after recording.  Grey dashed = evaluated and declined.</text>

</svg>
